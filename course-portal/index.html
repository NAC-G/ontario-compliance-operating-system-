<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAC Digital Foundation™ — Course Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   NAC DIGITAL FOUNDATION — COURSE DELIVERY PORTAL
   NAC Official Colour System
   ============================================================ */
:root {
  --bg:        #0D0F10;
  --bg2:       #15181A;
  --card:      #1C1F22;
  --raised:    #252B30;
  --surface:   #20242A;
  --text:      #F5F7F8;
  --text2:     #C9CED3;
  --muted:     #8A9197;
  --green:     #2E7D32;
  --green2:    #3FA34D;
  --green3:    #6FCF97;
  --amber:     #F2A65A;
  --amber2:    #F7BC81;
  --red:       #D64545;
  --border:    #2A2E33;
  --border2:   #23272B;
  --sidebar-w: 280px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ── LAYOUT ── */
.app {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width 0.3s ease;
}

.sidebar-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  letter-spacing: 0.08em;
  color: var(--text);
  margin-bottom: 2px;
}

.logo span { color: var(--green2); }

.logo-sub {
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-family: 'DM Mono', monospace;
}

.tier-tabs {
  display: flex;
  gap: 4px;
  padding: 12px 12px 0;
  flex-shrink: 0;
}

.tier-tab {
  flex: 1;
  padding: 7px 4px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
  letter-spacing: 0.05em;
}

.tier-tab:hover { color: var(--text2); border-color: var(--green); }

.tier-tab.active {
  background: var(--green);
  border-color: var(--green);
  color: #fff;
  font-weight: 600;
}

.tier-tab.t2.active { background: #1565C0; border-color: #1565C0; }
.tier-tab.t3.active { background: #6A1B9A; border-color: #6A1B9A; }
.tier-tab.t4.active { background: #BF360C; border-color: #BF360C; }

.tier-info {
  padding: 10px 14px 8px;
  flex-shrink: 0;
}

.tier-label {
  font-size: 0.7rem;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 2px;
}

.tier-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
  letter-spacing: 0.06em;
  color: var(--text);
}

.tier-price {
  font-size: 0.72rem;
  color: var(--green3);
  font-family: 'DM Mono', monospace;
}

.session-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px 8px 20px;
}

.session-list::-webkit-scrollbar { width: 4px; }
.session-list::-webkit-scrollbar-track { background: transparent; }
.session-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.session-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 2px;
}

.session-item:hover { background: var(--card); }
.session-item.active { background: var(--raised); }

.session-num {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  color: var(--muted);
  min-width: 22px;
}

.session-name {
  font-size: 0.78rem;
  color: var(--text2);
  flex: 1;
  line-height: 1.3;
}

.session-item.active .session-name { color: var(--text); }

.session-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  border: 1px solid var(--muted);
  flex-shrink: 0;
  transition: all 0.2s;
}

.session-item.done .session-dot {
  background: var(--green2);
  border-color: var(--green2);
}

.session-item.active .session-dot {
  border-color: var(--green2);
}

.progress-bar-wrap {
  padding: 10px 14px 12px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 0.65rem;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  margin-bottom: 6px;
}

.progress-bar {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--green2);
  border-radius: 2px;
  transition: width 0.4s ease;
}

/* ── MAIN CONTENT ── */
.main {
  flex: 1;
  overflow-y: auto;
  background: var(--bg);
}

.main::-webkit-scrollbar { width: 6px; }
.main::-webkit-scrollbar-track { background: transparent; }
.main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.content-header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: rgba(13,15,16,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 14px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
}

.breadcrumb {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 8px;
}

.breadcrumb span { color: var(--text2); }

.header-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

.btn-mark {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--muted);
  font-size: 0.72rem;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-mark:hover { border-color: var(--green2); color: var(--green3); }
.btn-mark.done { background: rgba(46,125,50,0.12); border-color: var(--green2); color: var(--green3); }

.btn-nav {
  padding: 6px 12px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--text2);
  font-size: 0.72rem;
  font-family: 'DM Mono', monospace;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-nav:hover { border-color: var(--green2); color: var(--green3); }
.btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

.content-body {
  max-width: 780px;
  margin: 0 auto;
  padding: 40px 40px 80px;
}

/* ── CONTENT TYPOGRAPHY ── */
.session-header {
  margin-bottom: 36px;
}

.session-eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--green3);
  margin-bottom: 10px;
}

.session-title-big {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2rem, 4vw, 3rem);
  letter-spacing: 0.04em;
  line-height: 1.05;
  color: var(--text);
  margin-bottom: 12px;
}

.session-meta {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.meta-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.72rem;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
}

.meta-pill::before {
  content: '';
  display: block;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--green2);
}

.divider-line {
  height: 1px;
  background: var(--border);
  margin: 28px 0;
}

/* Objectives box */
.objectives {
  background: rgba(46,125,50,0.06);
  border: 1px solid rgba(46,125,50,0.2);
  border-radius: 8px;
  padding: 20px 24px;
  margin-bottom: 28px;
}

.objectives-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--green3);
  margin-bottom: 12px;
}

.objectives ul {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 7px;
}

.objectives li {
  display: flex;
  gap: 10px;
  font-size: 0.85rem;
  color: var(--text2);
}

.objectives li::before {
  content: '→';
  color: var(--green2);
  flex-shrink: 0;
  font-family: 'DM Mono', monospace;
}

/* Content sections */
.content-section {
  margin-bottom: 32px;
}

.content-section h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  letter-spacing: 0.06em;
  color: var(--text);
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border2);
}

.content-section h3 {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text);
  margin: 20px 0 10px;
}

.content-section p {
  font-size: 0.88rem;
  color: var(--text2);
  line-height: 1.75;
  margin-bottom: 12px;
}

.content-section ul, .content-section ol {
  margin: 10px 0 14px 0;
  padding-left: 0;
  list-style: none;
}

.content-section li {
  font-size: 0.87rem;
  color: var(--text2);
  line-height: 1.65;
  padding: 4px 0 4px 20px;
  position: relative;
}

.content-section ul li::before {
  content: '·';
  position: absolute;
  left: 6px;
  color: var(--green2);
  font-weight: 700;
}

.content-section ol { counter-reset: list; }
.content-section ol li { counter-increment: list; }
.content-section ol li::before {
  content: counter(list) '.';
  position: absolute;
  left: 0;
  color: var(--green2);
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
}

/* Code blocks */
.code-block {
  background: #0A0C0D;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  margin: 14px 0;
}

.code-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
}

.code-lang {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
}

.copy-btn {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 0.62rem;
  font-family: 'DM Mono', monospace;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 3px;
  transition: all 0.2s;
}

.copy-btn:hover { color: var(--green3); background: rgba(46,125,50,0.1); }

.code-block pre {
  padding: 16px 18px;
  overflow-x: auto;
  font-family: 'DM Mono', monospace;
  font-size: 0.78rem;
  line-height: 1.85;
  color: var(--green3);
}

.code-block pre .comment { color: var(--muted); }
.code-block pre .cmd { color: var(--amber2); }

/* Info / warning boxes */
.callout {
  border-radius: 8px;
  padding: 16px 20px;
  margin: 16px 0;
  font-size: 0.84rem;
  line-height: 1.65;
}

.callout.info {
  background: rgba(21,101,192,0.08);
  border: 1px solid rgba(21,101,192,0.25);
  color: #90CAF9;
}

.callout.warning {
  background: rgba(242,166,90,0.07);
  border: 1px solid rgba(242,166,90,0.25);
  color: var(--amber2);
}

.callout.success {
  background: rgba(46,125,50,0.07);
  border: 1px solid rgba(46,125,50,0.2);
  color: var(--green3);
}

.callout.rule {
  background: rgba(214,69,69,0.06);
  border: 1px solid rgba(214,69,69,0.2);
  color: #F48FB1;
}

.callout strong { display: block; margin-bottom: 4px; font-weight: 600; }

/* Vocab table */
.vocab-table {
  width: 100%;
  border-collapse: collapse;
  margin: 14px 0;
  font-size: 0.83rem;
}

.vocab-table th {
  padding: 8px 14px;
  text-align: left;
  background: var(--card);
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
}

.vocab-table td {
  padding: 9px 14px;
  border-bottom: 1px solid var(--border2);
  color: var(--text2);
  vertical-align: top;
}

.vocab-table td:first-child {
  color: var(--amber2);
  font-family: 'DM Mono', monospace;
  font-size: 0.77rem;
  font-weight: 500;
  white-space: nowrap;
}

.vocab-table tr:hover td { background: var(--card); }

/* Quiz section */
.quiz-section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  margin-top: 36px;
}

.quiz-header {
  padding: 16px 22px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}

.quiz-icon {
  width: 28px;
  height: 28px;
  background: rgba(242,166,90,0.12);
  border: 1px solid rgba(242,166,90,0.25);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
}

.quiz-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
  letter-spacing: 0.06em;
  color: var(--text);
}

.quiz-body { padding: 20px 22px; }

.quiz-q {
  margin-bottom: 20px;
}

.quiz-q p {
  font-size: 0.85rem;
  color: var(--text);
  font-weight: 500;
  margin-bottom: 10px;
}

.quiz-options {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.quiz-opt {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px 12px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  font-size: 0.82rem;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
}

.quiz-opt:hover { border-color: var(--border); background: var(--raised); }

.quiz-opt.correct {
  background: rgba(46,125,50,0.1);
  border-color: var(--green2);
  color: var(--green3);
}

.quiz-opt.wrong {
  background: rgba(214,69,69,0.08);
  border-color: var(--red);
  color: #F48FB1;
}

.quiz-opt .opt-letter {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  font-weight: 600;
  min-width: 16px;
  margin-top: 1px;
}

/* Activity box */
.activity {
  background: rgba(242,166,90,0.05);
  border: 1px solid rgba(242,166,90,0.18);
  border-radius: 8px;
  padding: 18px 22px;
  margin: 18px 0;
}

.activity-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 10px;
}

.activity p, .activity li {
  font-size: 0.85rem;
  color: var(--text2);
}

/* Welcome / Tier overview screens */
.tier-overview {
  text-align: center;
  padding: 60px 40px;
}

.tier-overview-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(46,125,50,0.08);
  border: 1px solid rgba(46,125,50,0.2);
  border-radius: 100px;
  padding: 6px 18px;
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  color: var(--green3);
  text-transform: uppercase;
  margin-bottom: 24px;
}

.tier-overview h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2.5rem, 6vw, 4rem);
  letter-spacing: 0.04em;
  color: var(--text);
  margin-bottom: 14px;
}

.tier-overview p {
  font-size: 1rem;
  color: var(--text2);
  max-width: 500px;
  margin: 0 auto 36px;
  font-weight: 300;
  line-height: 1.7;
}

.overview-stats {
  display: flex;
  gap: 40px;
  justify-content: center;
  margin-bottom: 40px;
}

.overview-stat { text-align: center; }

.overview-stat-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.2rem;
  color: var(--green2);
  line-height: 1;
}

.overview-stat-label {
  font-size: 0.7rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-family: 'DM Mono', monospace;
  margin-top: 3px;
}

.start-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--green);
  color: #fff;
  padding: 13px 30px;
  border-radius: 6px;
  font-weight: 600;
  font-size: 0.88rem;
  border: none;
  cursor: pointer;
  transition: all 0.25s;
  letter-spacing: 0.03em;
}

.start-btn:hover { background: var(--green2); transform: translateY(-1px); box-shadow: 0 6px 30px rgba(46,125,50,0.3); }

/* Mobile toggle */
.menu-toggle {
  display: none;
  position: fixed;
  bottom: 20px;
  left: 20px;
  z-index: 100;
  width: 44px;
  height: 44px;
  background: var(--green);
  border: none;
  border-radius: 50%;
  cursor: pointer;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}

.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 40;
}

@media (max-width: 768px) {
  .sidebar {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    z-index: 50;
    transform: translateX(-100%);
    transition: transform 0.3s ease;
  }

  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.open { display: block; }
  .menu-toggle { display: flex; }
  .content-body { padding: 24px 20px 60px; }
  .content-header { padding: 12px 20px; }
  .tier-tabs { flex-wrap: wrap; }
}
</style>
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">NAC<span>.</span>Digital</div>
      <div class="logo-sub">Course Portal</div>
    </div>

    <div class="tier-tabs">
      <button class="tier-tab active" onclick="switchTier(1)">T1</button>
      <button class="tier-tab t2" onclick="switchTier(2)">T2</button>
      <button class="tier-tab t3" onclick="switchTier(3)">T3</button>
      <button class="tier-tab t4" onclick="switchTier(4)">T4</button>
    </div>

    <div class="tier-info">
      <div class="tier-label" id="tier-label">Tier 1 · Age 10+</div>
      <div class="tier-title" id="tier-title">Beginner Computer Course</div>
      <div class="tier-price" id="tier-price">$47 CAD · 20 Sessions</div>
    </div>

    <div class="session-list" id="session-list"></div>

    <div class="progress-bar-wrap">
      <div class="progress-label">
        <span>Progress</span>
        <span id="progress-text">0 / 20</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>
  </aside>

  <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

  <!-- MAIN -->
  <main class="main" id="main">
    <div class="content-header">
      <div class="breadcrumb" id="breadcrumb">
        <span id="bc-tier">T1</span> / <span id="bc-session">Overview</span>
      </div>
      <div class="header-actions">
        <button class="btn-nav" id="btn-prev" onclick="navigatePrev()" disabled>← Prev</button>
        <button class="btn-mark" id="btn-mark" onclick="toggleDone()">Mark Complete</button>
        <button class="btn-nav" id="btn-next" onclick="navigateNext()">Next →</button>
      </div>
    </div>
    <div class="content-body" id="content-body">
      <!-- Content renders here -->
    </div>
  </main>
</div>

<button class="menu-toggle" onclick="toggleSidebar()">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>

<h2>Lesson Content</h2>
<p>A computer is a machine that takes information in, processes it, and gives information back out. Think of it like a very fast, very smart helper that follows instructions exactly.</p>
<p>Computers are everywhere — phones, tablets, school computers, ATMs, even microwave ovens have small computers inside them. When we talk about "a computer" in this course, we usually mean a desktop or laptop computer.</p>

<ul>

<li>Process information (like doing math or running a game)</li>

<li>Create things (writing, drawing, making music)</li>
<li>Control other machines (printers, robots, cars)</li>

<p>Not all computers look the same. They come in many shapes and sizes, each designed for different jobs and situations.</p>
<h3>Desktop Computer</h3>
<p>A desktop computer sits on or under a desk. It has separate parts: a tower (the box that does the thinking), a monitor (the screen), a keyboard, and a mouse. Desktops are powerful and easy to upgrade, but they can't move around — they stay plugged in.</p>

<p>A smartphone is a small computer that fits in your pocket. It makes phone calls but also runs apps, browses the internet, takes photos, and much more. Most people interact with computers through smartphones every day.</p>
<h3>Server</h3>
<p>A server is a powerful computer that other computers connect to. When you visit a website, your computer is connecting to a server somewhere in the world that sends you the website. Servers usually run 24/7 without stopping.</p>
<h3>Supercomputer</h3>

<h2>Lesson Content</h2>
<p>Hardware is the physical parts of a computer — the parts you can actually touch and see. Let's learn the most important ones.</p>
<h3>Monitor (Screen)</h3>
<p>The monitor is the screen that shows you everything. When the computer processes something, the result usually appears on the monitor. Monitors come in different sizes, measured diagonally in inches.</p>
<h3>CPU (Central Processing Unit)</h3>
<p>The CPU is the brain of the computer. It does all the thinking and calculating. A faster CPU means the computer can do more things at once without slowing down. The CPU sits inside the tower (desktop) or inside the laptop's body.</p>
<h3>RAM (Random Access Memory)</h3>
<p>RAM is the computer's short-term memory. When you open a program, it loads into RAM so the CPU can access it quickly. More RAM means you can have more programs open at once without the computer slowing down. When you turn the computer off, everything in RAM disappears.</p>
<h3>Hard Drive / SSD (Storage)</h3>
<p>The hard drive (or SSD — Solid State Drive) is where the computer stores everything permanently — your files, photos, music, and programs. Unlike RAM, this memory stays even when the computer is turned off.</p>
<h3>Keyboard</h3>
<p>The keyboard is the main input device for typing. It has letter keys, number keys, and special keys like Shift, Enter, Backspace, and Ctrl.</p>
<h3>Mouse</h3>
<p>The mouse lets you point at things on screen and click on them. Moving the mouse moves the cursor (the arrow) on screen. Most mice have two buttons (left and right click) and a scroll wheel.</p>
<h3>Speakers</h3>
<p>Speakers are output devices that let you hear sound from the computer — music, videos, system notifications, and more.</p>
</div>`,

<h3>Starting Up</h3>
<p>To start a computer, press the power button. You'll see a startup process (called "booting") where the computer loads its operating system (usually Windows or macOS). This takes anywhere from a few seconds to a minute or two. Wait for it to finish before clicking anything.</p>

<h3>Shutting Down Safely</h3>
<p>NEVER turn a computer off by holding the power button or unplugging it while it's running (unless it's completely frozen). Instead, use the operating system's shutdown process.</p>
<h3>Windows Shutdown Steps</h3>
<ol>
<li>Click the <strong>Start</strong> button (Windows logo, bottom-left)</li>
<li>Click the <strong>Power</strong> icon</li>
<li>Click <strong>Shut down</strong></li>
<li>Wait for the screen to go black before moving the computer</li>

<h3>Why does this matter?</h3>
<p>When the computer shuts down properly, it saves any work in progress, closes all programs safely, and prepares the hard drive for the next startup. Cutting the power suddenly can corrupt files and cause errors.</p>

<p>We've talked about hardware (the physical parts). Now let's understand software — the instructions that make the hardware do things.</p>
<h3>Software vs Hardware</h3>
<p><strong>Hardware</strong> is the physical machine — things you can touch: the screen, keyboard, CPU, RAM.</p>
<p><strong>Software</strong> is the code (instructions) that runs on the hardware. You can't touch software — it's purely digital information. Without software, hardware is just an expensive paperweight.</p>
<h3>Types of Software</h3>
<h3>System Software</h3>
<p>System software manages and controls the hardware. The most important piece of system software is the Operating System (Windows, macOS, Linux). System software runs in the background — you don't usually interact with it directly.</p>
<h3>Application Software</h3>
<p>Application software (apps/programs) are the tools you actually use to do work or have fun. Word processors, games, browsers, photo editors — these are all application software.</p>
<h3>How Software Gets On Your Computer</h3>
<ul>
<li><strong>Pre-installed</strong> — comes with the computer (like Windows itself)</li>
<li><strong>Downloaded and installed</strong> — you download a setup file and run it</li>
<li><strong>From an app store</strong> — Microsoft Store, App Store (trusted source)</li>
<li><strong>From the web</strong> — downloaded from a website (be careful — only from trusted sites)</li>
</ul>
<h3>Software Updates</h3>
<p>Software companies release updates to fix bugs and security issues. Keeping your software updated is an important security habit. Windows Update handles this automatically.</p>
<div class="callout warning"><strong>Safety tip:</strong> Only install software from sources you trust. Fake "download" buttons on websites can install harmful software (malware).</div>
</div>`,

        content: `<div class="content-section">
<h2>Lesson Content</h2>
<p>Creating a file is only useful if you save it. Saving writes your work to the hard drive so it's there next time you open the computer.</p>
<h3>Saving for the First Time (Save As)</h3>
<p>When you create a new file and save it for the first time, the program asks you WHERE to save it and WHAT to name it. This is "Save As."</p>
<ol>
<li>Go to File → Save As (or press Ctrl + Shift + S)</li>
<li>Choose a location (e.g., Documents)</li>
<li>Type a file name</li>
<li>Choose the file type (usually leave at default)</li>
<li>Click Save</li>
</ol>
<h3>Saving After Changes (Save)</h3>
<p>After the first save, use Ctrl + S to save your latest changes. This overwrites the existing file — the old version is replaced with the new one.</p>
<div class="callout warning"><strong>Save often!</strong> If the computer crashes or the power goes out and you haven't saved, you'll lose your work. Save after every significant change.</div>
<h3>Opening an Existing File</h3>
<p>Three ways to open a file:</p>
<ol>
<li><strong>Double-click</strong> the file in File Explorer — Windows opens the right program automatically</li>
<li>Open the program first, then <strong>File → Open</strong> (Ctrl + O) and browse to the file</li>
<li><strong>Recent files</strong> — most programs show recently opened files in the File menu</li>
</ol>
<h3>File → Save vs File → Save As</h3>
<ul>
<li><strong>Save (Ctrl+S)</strong> — saves changes to the same file in the same location</li>
<li><strong>Save As (Ctrl+Shift+S)</strong> — saves a copy with a new name or in a new location. Original is unchanged.</li>
</ul>
</div>`,

        content: `<div class="content-section">
<h2>Lesson Content</h2>
<p>The internet has become part of everyday life, but many people don't really know what it is. Let's understand it clearly.</p>
<h3>What Is the Internet?</h3>
<p>The internet is a massive global network of computers connected together. Billions of devices — computers, phones, servers — are all linked, and they can communicate with each other by sending information back and forth.</p>
<p>Think of it like a huge road network. Just as roads connect cities and towns, the internet connects computers and devices. The "roads" for the internet are cables (some underground, some under oceans), wireless signals, and satellites.</p>
<h3>The Internet vs The World Wide Web</h3>
<p>People often use these words interchangeably, but they're different:</p>
<ul>
<li><strong>The internet</strong> is the underlying network — the infrastructure of connections</li>
<li><strong>The World Wide Web (WWW)</strong> is one service that uses the internet — it's all the websites you visit</li>
</ul>
<p>Email, video calls, and online gaming also use the internet but are not "the web."</p>
<h3>How You Connect to the Internet</h3>
<ul>
<li><strong>Wi-Fi</strong> — wireless connection through a router at home, school, or public spaces</li>
<li><strong>Ethernet</strong> — a cable plugged from the computer to a router (faster and more reliable)</li>
<li><strong>Mobile data (4G/5G)</strong> — internet through a phone network</li>
</ul>
<h3>What Is a Router?</h3>
<p>A router is a device that connects your home network to the internet. When you connect to Wi-Fi, you're connecting to the router, and the router connects to the internet service provider (ISP).</p>
</div>`,

        content: `<div class="content-section">
<h2>Lesson Content</h2>
<p>The internet is powerful and useful, but it has risks. Learning to stay safe online is just as important as learning to use a computer.</p>
<div class="callout rule"><strong>Core Rule:</strong> If something online makes you uncomfortable, confused, or scared — tell a trusted adult immediately. Never deal with it alone.</div>
<h3>Personal Information Rules</h3>
<p>Some information should NEVER be shared online with strangers or on public websites:</p>
<ul>
<li>Full name + school name together</li>
<li>Home address or neighbourhood</li>
<li>Phone number</li>
<li>Passwords</li>
<li>Photos of yourself to strangers</li>
<li>Financial information</li>
</ul>
<h3>Recognizing Fake and Dangerous Content</h3>
<ul>
<li><strong>Phishing</strong> — fake emails or websites that look real, trying to steal your password or information. Signs: urgent language, spelling errors, suspicious links.</li>
<li><strong>Scams</strong> — "You've won a prize!" — if it sounds too good to be true, it is.</li>
<li><strong>Malware</strong> — harmful software often disguised as something helpful. Don't click on random download links.</li>
<li><strong>Strangers online</strong> — people online aren't always who they say they are. Never meet someone you only know online without a parent present.</li>
</ul>
<h3>Safe Browsing Habits</h3>
<ul>
<li>Look for https:// (the padlock) on websites before entering any information</li>
<li>Don't click "Accept All" on every popup without reading</li>
<li>Log out of accounts on shared computers</li>
<li>Keep your software updated (security patches)</li>
<li>Tell an adult if something seems wrong</li>
</ul>
</div>`,

        content: `<div class="content-section">
<h2>Lesson Content</h2>
<p>Passwords are the keys to your digital life. Weak passwords are like leaving your front door unlocked.</p>
<h3>What Makes a Password Weak?</h3>
<ul>
<li>Short (less than 8 characters)</li>
<li>Obvious words: "password", "123456", your name, your birthday</li>
<li>Only letters or only numbers</li>
<li>The same password used everywhere</li>
</ul>
<h3>What Makes a Password Strong?</h3>
<ul>
<li>At least 12 characters long</li>
<li>Mix of uppercase, lowercase, numbers, and symbols</li>
<li>Not a real word (or a very unusual combination)</li>
<li>Unique — different for every account</li>
</ul>
<h3>The Passphrase Method</h3>
<p>A passphrase is a series of random words combined. It's long (strong) but easier to remember than random characters.</p>
<p>Example: <strong>Tree!Mountain7Blue#Cup</strong> — random, long, memorable if you picture the scene.</p>
<h3>Never Share Passwords</h3>
<div class="callout rule"><strong>Rule:</strong> Never share your password with anyone — not friends, not classmates, and not anyone who emails or messages you asking for it. No real company will ever ask for your password.</div>
<h3>Password Managers</h3>
<p>A password manager is an app (like Bitwarden or the browser's built-in one) that stores all your passwords securely. You only need to remember one master password. This is the safest way to have different strong passwords for every site.</p>
</div>`,

<h2>Lesson Content</h2>
<p>Typing is the core skill that makes using a computer efficient. Learning to type properly — without looking at the keyboard — makes everything faster and easier.</p>
<h3>Home Row Position</h3>
<p>The home row is the middle row of letter keys. Your fingers rest here when you're not typing. This is the starting position for touch typing.</p>
<div class="code-block"><div class="code-header"><span class="code-lang">Home Row Keys</span></div><pre>Left hand:   A  S  D  F  (index finger on F)
Right hand:  J  K  L  ;  (index finger on J)

The F and J keys have small bumps — feel for them without looking.</pre></div>
<h3>Finger Assignment</h3>
<ul>
<li><strong>Left pinky</strong> → A, Q, Z, Shift, Caps Lock</li>
<li><strong>Left ring</strong> → S, W, X</li>
<li><strong>Left middle</strong> → D, E, C</li>
<li><strong>Left index</strong> → F, G, R, T, V, B</li>
<li><strong>Right index</strong> → J, H, Y, U, N, M</li>
<li><strong>Right middle</strong> → K, I, comma</li>
<li><strong>Right ring</strong> → L, O, period</li>
<li><strong>Right pinky</strong> → ; : ' " / \ Enter Shift</li>
<li><strong>Both thumbs</strong> → Space bar</li>
</ul>
<h3>Practice Resources</h3>
<ul>
<li><strong>typing.com</strong> — free, structured typing lessons</li>
<li><strong>keybr.com</strong> — adapts to your weak keys</li>
<li><strong>monkeytype.com</strong> — typing speed tests</li>
</ul>
<div class="callout success"><strong>Tip:</strong> Don't look at the keyboard while typing. It feels slow at first, but it's the only way to build real speed. Trust your fingers to find the keys.</div>
</div>`,

    sessions: [
      { num: '01', title: 'Terminal Basics', tags: ['Foundation'], objectives: ['Open a terminal', 'Know where you are with pwd', 'List files with ls', 'Move between folders with cd'], content: `<div class="content-section"><h2>Day 1 Goal</h2><p>Open the terminal. Know where you are. Move safely. This is the foundation of everything.</p><div class="callout rule"><strong>Rule #1:</strong> If you ever feel confused, type <code>cd ~</code> and press Enter. This brings you back to your home folder — the safe starting point.</div><h2>Core Commands</h2><div class="code-block"><div class="code-header"><span class="code-lang">bash</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><span class="comment"># Know where you are</span>

      { num: '02', title: 'Files & Writing', tags: ['Files', 'nano'], objectives: ['Create files with touch', 'Edit files with nano', 'Read file contents with cat'], content: `<div class="content-section"><h2>Day 2 Goal</h2><p>Create files, write inside them, save and read them back.</p><div class="code-block"><div class="code-header"><span class="code-lang">bash</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><span class="comment"># Create an empty file</span>

      { num: '03', title: 'Copying & Moving', tags: ['File Management'], objectives: ['Copy files with cp', 'Move and rename files with mv', 'Understand the difference between cp and mv'], content: `<div class="content-section"><h2>Day 3 Goal</h2><p>Copy files, rename them, move them into folders. Organise your work.</p><div class="code-block"><div class="code-header"><span class="code-lang">bash</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><span class="comment"># Copy a file</span>

      { num: '04', title: 'Network Basics', tags: ['Networking'], objectives: ['View your IP address', 'Test connectivity with ping', 'Understand IP addresses and ports'], content: `<div class="content-section"><h2>Day 4 Goal</h2><p>Learn how your computer talks to other computers on a network.</p><div class="code-block"><div class="code-header"><span class="code-lang">bash</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><span class="comment"># View your IP address and network interfaces</span>

      { num: '05', title: 'Installing Software', tags: ['Package Manager'], objectives: ['Update package lists with apt update', 'Install software with apt install', 'Remove software with apt remove'], content: `<div class="content-section"><h2>Day 5 Goal</h2><p>Install and manage software using Ubuntu\'s package manager.</p><div class="code-block"><div class="code-header"><span class="code-lang">bash</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><span class="comment"># Always update package list first</span>

      { num: '06', title: 'Users & Permissions', tags: ['Security', 'Permissions'], objectives: ['Understand Linux user and permission model', 'Read permission strings', 'Change permissions with chmod'], content: `<div class="content-section"><h2>Day 6 Goal</h2><p>Learn who can do what on a Linux system. Permissions are Linux\'s security foundation.</p><div class="code-block"><div class="code-header"><span class="code-lang">bash</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><span class="comment"># Who am I?</span>

chmod a+r file.txt    <span class="comment"># Add read for all</span></pre></div></div>`, vocab: [['whoami', 'Shows your current username'], ['chmod', 'Change file permissions'], ['r/w/x', 'Read / Write / Execute permissions'], ['Owner/Group/Others', 'The three permission categories in Linux'], ['755', 'rwxr-xr-x: owner full, group and others read+execute']], activity: 'Create a file notes.txt. Run ls -l to see its permissions. Change it to 644 with chmod. Create a script.sh and make it executable with chmod 755. Check permissions with ls -l after each change.', quiz: [{ q: 'What does r, w, x stand for?', opts: ['Run, Write, eXchange', 'Read, Write, eXecute', 'Root, Write, eXit', 'Read, Work, eXport'], a: 1 }, { q: 'What does chmod 600 do to a file?', opts: ['Makes it readable by everyone', 'Gives owner read+write only — no access for group or others', 'Makes it executable', 'Deletes permissions'], a: 1 }, { q: 'What does ls -l show that ls alone does not?', opts: ['Hidden files', 'Permissions, owner, size, and date', 'File contents', 'File types'], a: 1 }] },
      { num: '07', title: 'Services & Logs', tags: ['Capstone', 'Services'], objectives: ['List running services', 'Start and stop a service', 'Read system logs with journalctl'], content: `<div class="content-section"><h2>Day 7 Goal — Capstone</h2><p>Learn about background programs (services) and how to read what the computer is recording about itself.</p><div class="code-block"><div class="code-header"><span class="code-lang">bash</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><span class="comment"># View running services</span>

      { num: '01', title: 'Linux Basics Mastery', tags: ['Foundation'], objectives: ['Command navigation at speed', 'No hesitation with pwd, ls, cd, mkdir', 'Build the habit of knowing where you are'], content: `<div class="content-section"><h2>Phase Goal</h2><p>Move around Linux safely and confidently. This phase is about making the basics automatic — not just knowing the commands, but trusting your hands to run them.</p><div class="callout rule"><strong>Rule:</strong> Always know where you are before running a command. pwd is free. Use it.</div><div class="code-block"><div class="code-header"><span class="code-lang">bash — Navigation</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre>pwd          <span class="comment"># Where am I?</span>

cp file.txt file_bak.txt
mv file.txt work/
rm file_bak.txt</pre></div><h3>Drill: Speed Navigation</h3><p>Run this sequence from memory, without looking at notes:</p><ol><li>cd ~ → pwd → ls</li><li>mkdir security_lab → cd security_lab</li><li>touch test.txt → nano test.txt → write something → save → exit</li><li>cat test.txt → ls -la</li><li>cd ~ → verify with pwd</li></ol></div>`, vocab: [['Navigation', 'Moving between directories in the filesystem'], ['Muscle memory', 'Commands that become automatic through repetition'], ['Working directory', 'The folder you are currently in']], activity: 'Complete the speed navigation drill 3 times. Time yourself. Target: under 90 seconds by run 3.', quiz: [{ q: 'What is the rule before running any command?', opts: ['Update software first', 'Know where you are', 'Check permissions', 'Read the man page'], a: 1 }, { q: 'What does cd .. do?', opts: ['Go to home', 'Go to root', 'Go up one directory', 'Go to last visited directory'], a: 2 }, { q: 'How do you always quickly return to a safe location?', opts: ['cd /home', 'cd back', 'cd ~', 'pwd'], a: 2 }] },
      { num: '02', title: 'Files & Permissions', tags: ['Security'], objectives: ['Read and interpret permission strings', 'Change permissions with chmod', 'Understand why permissions matter for security'], content: `<div class="content-section"><h2>Phase Goal</h2><p>Understand who can read, write, and run files. This is fundamental to Linux security.</p><div class="code-block"><div class="code-header"><span class="code-lang">bash — Permissions</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre>ls -l              <span class="comment"># View permissions</span>
whoami             <span class="comment"># Who are you?</span>
id                 <span class="comment"># Your full identity (UID, GID, groups)</span>

<span class="comment"># Reading permission strings:</span>
<span class="comment"># -rwxr-xr-x  =  owner:rwx  group:r-x  others:r-x</span>
<span class="comment"># r=4  w=2  x=1  (add them up)</span>
<span class="comment"># 7=rwx  6=rw-  5=r-x  4=r--  0=---</span>

chmod 755 script.sh    <span class="comment"># Standard: owner full, others read+exec</span>
chmod 644 notes.txt    <span class="comment"># Standard: owner rw, others read-only</span>
chmod 600 private.key  <span class="comment"># Private: owner only</span>
chmod 700 secret/      <span class="comment"># Private directory</span>

chown user:group file  <span class="comment"># Change ownership</span>
sudo chown root file   <span class="comment"># Give to root</span></pre></div><div class="callout rule"><strong>Security Rule:</strong> Not everyone gets the same keys. Sensitive files should be 600 or 700. Never leave private keys or passwords with world-readable permissions (644 or worse).</div></div>`, vocab: [['chmod', 'Change file mode (permissions)'], ['chown', 'Change file owner'], ['755', 'rwxr-xr-x — standard for executables'], ['600', 'rw------- — private, owner only'], ['UID/GID', 'User ID / Group ID — numeric identifiers']], activity: 'Create 4 files. Set one to 755, one to 644, one to 600, one to 700. Check each with ls -l. Try reading each one as a different perspective.', quiz: [{ q: 'What does chmod 600 mean?', opts: ['Read only for everyone', 'Read and write for owner, nothing for others', 'Full access for owner', 'Execute only'], a: 1 }, { q: 'Which permission set is appropriate for an SSH private key?', opts: ['644', '755', '600', '777'], a: 2 }, { q: 'What does the number 7 mean in octal permissions?', opts: ['Read only', 'Write only', 'Read, write, and execute', 'No permissions'], a: 2 }] },
      { num: '03', title: 'Networking Fundamentals', tags: ['Networking'], objectives: ['Understand IP addresses and ports', 'Test connectivity', 'Know what a router, DNS, and gateway are'], content: `<div class="content-section"><h2>Phase Goal</h2><p>Understand how computers talk to each other. This is required knowledge before any network security work.</p><div class="code-block"><div class="code-header"><span class="code-lang">bash — Networking</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre>ip a                         <span class="comment"># View interfaces and IPs</span>
ip route                     <span class="comment"># Routing table</span>
ip route show default        <span class="comment"># Gateway</span>

ping -c 4 8.8.8.8            <span class="comment"># Test internet (Google DNS)</span>
ping -c 4 google.com         <span class="comment"># Test DNS resolution</span>

nslookup google.com          <span class="comment"># DNS lookup</span>
dig google.com               <span class="comment"># Detailed DNS info</span>

ss -tuln                     <span class="comment"># What ports are listening?</span>
<span class="comment"># t=TCP  u=UDP  l=listening  n=numeric</span></pre></div><h3>Core Networking Concepts</h3><table class="vocab-table"><thead><tr><th>Concept</th><th>Analogy</th><th>Reality</th></tr></thead><tbody><tr><td>IP Address</td><td>House address</td><td>Unique network identifier (e.g. 192.168.1.5)</td></tr><tr><td>Port</td><td>Door number</td><td>Numbered channel for specific services</td></tr><tr><td>Gateway</td><td>Traffic cop</td><td>Router that routes traffic to the internet</td></tr><tr><td>DNS</td><td>Phone book</td><td>Translates names to IP addresses</td></tr><tr><td>Subnet</td><td>Neighbourhood</td><td>Group of IPs in the same network range</td></tr></tbody></table><div class="callout rule"><strong>Rule:</strong> Know the layout of a network before testing it. You must know where a system is before scanning or testing it.</div></div>`, vocab: [['IP address', 'Unique numeric identifier for a device on a network'], ['Port', 'Numbered service channel (SSH=22, HTTP=80, HTTPS=443)'], ['Gateway', 'The router that routes to the internet'], ['DNS', 'Domain Name System — translates names to IPs'], ['ss', 'Socket statistics — shows listening ports']], activity: 'Run ip a and record your IP. Run ip route to find your gateway. Ping the gateway. Ping 8.8.8.8. Ping google.com. Run ss -tuln and identify what\'s listening on port 22.', quiz: [{ q: 'What port does SSH use by default?', opts: ['80', '443', '22', '3306'], a: 2 }, { q: 'What does DNS do?', opts: ['Routes traffic', 'Translates domain names to IP addresses', 'Assigns IPs', 'Encrypts connections'], a: 1 }, { q: 'What does ss -tuln show?', opts: ['File permissions', 'Running processes', 'Network ports that are listening', 'Disk usage'], a: 2 }] },
      { num: '04', title: 'Security Mindset & Ethics', tags: ['Ethics', 'Critical'], objectives: ['Define ethical vs unethical security practice', 'Understand legal implications of unauthorized access', 'Build the mental model that guides all future security work'], content: `<div class="content-section"><h2>Phase Goal</h2><p>Build the ethical framework required before touching any security tool. This isn't optional — it\'s the difference between a professional and a criminal.</p><div class="callout rule"><strong>The Golden Rule:</strong> If it is not yours, do not touch it. Permission must be explicit, written, and given before testing begins.</div><h3>What Is Ethical Security?</h3><p>Ethical security (also called penetration testing or ethical hacking) is the authorized practice of testing systems to find vulnerabilities before malicious attackers do. The key word is <strong>authorized</strong>.</p><h3>Allowed vs Not Allowed</h3><div class="code-block"><div class="code-header"><span class="code-lang">Rules</span></div><pre><span class="comment"># ALLOWED:</span>
Your own personal systems
Virtual machines you built
Practice platforms (TryHackMe, HackTheBox)
Systems you have WRITTEN permission to test

<span class="comment"># NOT ALLOWED — EVER:</span>
School or work networks
Public Wi-Fi hotspots
Your neighbour's Wi-Fi
Any system without explicit permission
"Just looking" still counts as unauthorized access</pre></div><h3>The Law</h3><p>Unauthorized access to computer systems is a criminal offense in Canada under the Criminal Code (Section 342.1) and internationally under similar laws. "I was just curious" is not a legal defense. Penalties include fines, probation, and imprisonment.</p><h3>The Professional Path</h3><p>Real security professionals work within strict rules of engagement. They have signed contracts, defined scope, and clear boundaries. They document everything. They stop the moment they exceed scope.</p></div>`, vocab: [['Authorization', 'Written permission to test a specific system'], ['Scope', 'The defined boundary of what is allowed in a security test'], ['Penetration testing', 'Authorized security testing to find vulnerabilities'], ['Rule of engagement', 'The formal rules defining what is allowed in a security test']], activity: 'Scenario analysis: For each scenario, decide Legal or Illegal: (1) Testing your own home lab VM. (2) Scanning the school Wi-Fi to "learn." (3) Testing a friend\'s server without asking. (4) Using TryHackMe\'s practice lab. (5) Checking your own router\'s admin page.', quiz: [{ q: 'What makes security testing ethical?', opts: ['Doing it carefully', 'Using the right tools', 'Having written authorization from the system owner', 'Not breaking anything'], a: 2 }, { q: 'Is unauthorized access legal if you find no vulnerabilities?', opts: ['Yes, if nothing is damaged', 'No — authorization is required regardless of outcome', 'Yes, if you\'re learning', 'It depends on the country'], a: 1 }, { q: 'Which is an approved practice environment?', opts: ['Your employer\'s network', 'A public library Wi-Fi', 'TryHackMe practice platform', 'A hotel Wi-Fi'], a: 2 }] },
      { num: '05', title: 'Logs & Evidence', tags: ['Analysis'], objectives: ['Read system logs with journalctl', 'Find authentication events in auth.log', 'Understand why logs matter for security'], content: `<div class="content-section"><h2>Phase Goal</h2><p>Read system logs before acting. Logs are the computer\'s diary — security professionals read them first.</p><div class="code-block"><div class="code-header"><span class="code-lang">bash — Logs</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre>journalctl -n 20          <span class="comment"># Last 20 log entries</span>
journalctl -f             <span class="comment"># Follow live (Ctrl+C to stop)</span>
journalctl -u ssh         <span class="comment"># Only SSH service logs</span>
journalctl -p err         <span class="comment"># Errors only</span>
journalctl --since "1 hour ago"
journalctl --since yesterday

<span class="comment"># Auth log — logins, sudo, SSH</span>
sudo cat /var/log/auth.log | tail -30
grep "Failed password" /var/log/auth.log
grep "Accepted" /var/log/auth.log

<span class="comment"># Syslog — general system messages</span>
tail -f /var/log/syslog</pre></div><h3>What to Look For</h3><ul><li><strong>Failed password</strong> entries — possible brute force attempt</li><li><strong>Accepted publickey</strong> — successful SSH login (who? when? from where?)</li><li><strong>sudo</strong> entries — who ran what as root</li><li><strong>Error/crit messages</strong> — system problems</li></ul><div class="callout rule"><strong>Rule:</strong> Read before acting. Logs = computer\'s diary. A professional reads them before changing anything.</div></div>`, vocab: [['journalctl', 'Views systemd journal logs'], ['auth.log', 'Authentication log: SSH logins, sudo, user changes'], ['syslog', 'General system message log'], ['tail -f', 'Follow a log file live as it updates'], ['grep', 'Search for patterns in text output']], activity: 'Run journalctl -n 30. Find and read the SSH logs with journalctl -u ssh. Check /var/log/auth.log for any failed login attempts. Run journalctl -f and watch for a minute.', quiz: [{ q: 'What does journalctl -f do?', opts: ['Shows first log entry', 'Follows logs live in real time', 'Filters by error level', 'Shows last 20 entries'], a: 1 }, { q: 'What does "Failed password" in auth.log indicate?', opts: ['A successful login', 'A system error', 'A failed login attempt — possible brute force', 'A package install'], a: 2 }, { q: 'Why do security professionals read logs before acting?', opts: ['It is required by law', 'Logs show what has happened and provide evidence', 'Logs slow the computer down', 'It is a formality'], a: 1 }] },
      { num: '06', title: 'Lab Discipline', tags: ['Capstone'], objectives: ['Set up a safe personal lab environment', 'Practice the lab checklist', 'Graduate ready for Kali Linux work'], content: `<div class="content-section"><h2>Phase Goal — Capstone</h2><p>Practice only in safe, controlled environments. This rule is what separates professionals from people who get arrested.</p><div class="callout rule"><strong>Rule:</strong> Playgrounds, not streets. Practice where the consequences of mistakes affect only you.</div><h3>Approved Lab Environments</h3><div class="code-block"><div class="code-header"><span class="code-lang">Setup</span></div><pre><span class="comment"># Minimum free lab setup:</span>
1. Download VirtualBox → virtualbox.org (free)
2. Download Ubuntu ISO → ubuntu.com (free)
3. Create VM: 2GB RAM, 20GB storage (dynamic)
4. Install Ubuntu in the VM
5. Take a snapshot (Snapshots → Take)
   → This is your undo button

<span class="comment"># Free practice platforms:</span>

HackTheBox.com    → Structured challenges
OverTheWire.org   → Command-line challenges</pre></div><h3>Lab Checklist (Use Every Session)</h3><div class="activity"><div class="activity-label">Pre-Session Checklist</div><ul><li>I am inside my VM or approved platform</li><li>I have taken a snapshot (or can restore)</li><li>I know what I am about to run</li><li>I have read the command before pressing Enter</li><li>If unsure: stop, research, then proceed</li></ul></div><div class="callout success"><strong>Course Complete!</strong> You have completed all 6 phases of the Pre-Kali Foundation. You have the mindset, the commands, the networking knowledge, the ethics framework, and the lab discipline. You are ready for Tier 4 and beyond.</div></div>`, vocab: [['Virtual machine', 'A simulated computer running inside your real computer'], ['Snapshot', 'A saved state of a VM you can restore to'], ['TryHackMe', 'A beginner-friendly security practice platform'], ['Scope', 'The defined limit of what you are allowed to test']], activity: 'Set up VirtualBox with an Ubuntu VM. Take your first snapshot. Create your lab folder. Sign up for TryHackMe and complete the first "Linux Fundamentals" room.', quiz: [{ q: 'What is a VM snapshot?', opts: ['A screenshot of the VM', 'A saved state you can restore to if something breaks', 'A backup of your files', 'A type of VM format'], a: 1 }, { q: 'Why is a VM a good lab environment?', opts: ['It is faster than a real computer', 'Mistakes are contained — you can restore with a snapshot', 'It uses less electricity', 'It connects to the internet automatically'], a: 1 }, { q: 'What should you do when unsure about a command?', opts: ['Run it and see what happens', 'Ask a friend to run it', 'Stop, research it, then decide', 'Run it with sudo for more power'], a: 2 }] }
    ]

    sessions: [
      { num: '01', title: 'Shell Environment Deep Dive', tags: ['Shell', 'Config'], objectives: ['Configure .bashrc and .bash_profile', 'Set and persist environment variables', 'Create aliases and customize PATH'], content: `<div class="content-section"><h2>Objectives</h2><div class="code-block"><div class="code-header"><span class="code-lang">bash — Shell Config</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><span class="comment"># Startup file order:</span>
<span class="comment"># Login shell: /etc/profile → ~/.bash_profile</span>
<span class="comment"># New terminal: /etc/bash.bashrc → ~/.bashrc</span>
<span class="comment"># Best practice: put everything in ~/.bashrc</span>

<span class="comment"># Environment variables</span>
env                           <span class="comment"># List all variables</span>
echo $HOME                    <span class="comment"># Your home directory</span>
echo $PATH                    <span class="comment"># Command search directories</span>
echo $USER                    <span class="comment"># Your username</span>

export MY_VAR="hello"         <span class="comment"># Set for session</span>
echo 'export MY_VAR="hello"' >> ~/.bashrc  <span class="comment"># Make permanent</span>
source ~/.bashrc              <span class="comment"># Reload config</span>
unset MY_VAR                  <span class="comment"># Remove variable</span>

<span class="comment"># PATH — add your scripts folder</span>
mkdir -p ~/bin
echo 'export PATH=$PATH:~/bin' >> ~/.bashrc

<span class="comment"># Aliases</span>
alias ll='ls -la'
alias update='sudo apt update && sudo apt upgrade'
alias ..='cd ..'
alias grep='grep --color=auto'
echo "alias ll='ls -la'" >> ~/.bashrc  <span class="comment"># Persist</span>

<span class="comment"># Custom prompt (PS1)</span>
export PS1='\\u@\\h:\\w\\$ '     <span class="comment"># user@host:dir$</span></pre></div><h3>Key Variables Reference</h3><table class="vocab-table"><thead><tr><th>Variable</th><th>Meaning</th></tr></thead><tbody><tr><td>$HOME</td><td>Home directory</td></tr><tr><td>$PATH</td><td>Command search directories</td></tr><tr><td>$USER</td><td>Current username</td></tr><tr><td>$SHELL</td><td>Current shell</td></tr><tr><td>$PWD</td><td>Current working directory</td></tr><tr><td>$EDITOR</td><td>Default text editor</td></tr></tbody></table></div>`, vocab: [['~/.bashrc', 'Shell config loaded for every new terminal session'], ['export', 'Makes a variable available to child processes'], ['PATH', 'Directories the shell searches for commands'], ['alias', 'A shortcut name for a longer command'], ['source', 'Reloads a config file without logging out']], activity: '1. Add 5 useful aliases to ~/.bashrc. 2. Add ~/bin to PATH. 3. Create a custom PS1 with your name. 4. Set EDITOR=nano permanently. 5. Source and verify all changes.', quiz: [{ q: 'Which file should you put shell customizations in?', opts: ['/etc/profile', '~/.bash_profile', '~/.bashrc', '/etc/bash.bashrc'], a: 2 }, { q: 'How do you reload .bashrc without logging out?', opts: ['bash reload', 'exec bash', 'source ~/.bashrc', 'restart shell'], a: 2 }, { q: 'What does $PATH control?', opts: ['Your home directory', 'Directories the shell searches for commands', 'Your username', 'Your shell type'], a: 1 }] },
      { num: '02', title: 'Advanced File Operations', tags: ['find', 'grep', 'awk', 'sed'], objectives: ['Search files with find and grep', 'Transform text with awk and sed', 'Chain commands with pipes and redirection'], content: `<div class="content-section"><div class="code-block"><div class="code-header"><span class="code-lang">bash — find</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre>find ~ -name "*.log"           <span class="comment"># By name</span>
find ~ -type f                 <span class="comment"># Files only</span>
find ~ -type d                 <span class="comment"># Dirs only</span>
find / -size +100M             <span class="comment"># Over 100MB</span>
find ~ -mtime -7               <span class="comment"># Modified last 7 days</span>
find /tmp -name "*.tmp" -exec rm {} \;</pre></div><div class="code-block"><div class="code-header"><span class="code-lang">bash — grep</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre>grep "word" file.txt
grep -i "word" file.txt        <span class="comment"># Case-insensitive</span>
grep -r "word" /dir/           <span class="comment"># Recursive</span>
grep -n "word" file.txt        <span class="comment"># Line numbers</span>
grep -v "word" file.txt        <span class="comment"># Invert</span>
grep -E "^error" /var/log/syslog   <span class="comment"># Regex</span></pre></div><div class="code-block"><div class="code-header"><span class="code-lang">bash — awk & sed</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><span class="comment"># awk — column processor</span>
awk '{print $1}' file.txt              <span class="comment"># First column</span>
awk -F: '{print $1}' /etc/passwd       <span class="comment"># Usernames</span>
awk '$3 > 100 {print $1}' file.txt     <span class="comment"># Conditional</span>

<span class="comment"># sed — stream editor</span>
sed 's/old/new/g' file.txt         <span class="comment"># Replace all</span>
sed -i 's/old/new/g' file.txt      <span class="comment"># Edit in place</span>
sed '3d' file.txt                  <span class="comment"># Delete line 3</span>
sed -n '5,10p' file.txt            <span class="comment"># Print lines 5-10</span>

<span class="comment"># Pipes</span>
cat /var/log/syslog | grep error | tail -20
ps aux | grep nginx
find ~ -name "*.txt" | xargs grep "keyword"</pre></div></div>`, vocab: [['find', 'Searches the filesystem for files matching criteria'], ['grep', 'Searches file contents for matching patterns'], ['awk', 'Processes and transforms text by columns'], ['sed', 'Stream editor — find, replace, delete in text'], ['xargs', 'Converts pipe output into arguments for another command']], activity: '1. Find all .log files in /var/log modified last 3 days. 2. Search syslog for "error" with grep -r. 3. Print usernames from /etc/passwd with awk. 4. Replace a word in a file with sed -i. 5. Chain find | xargs grep.', quiz: [{ q: 'Find files over 50MB: find / -size ___', opts: ['>50M', '+50M', '50MB', '-50M'], a: 1 }, { q: 'awk -F: prints from /etc/passwd with what delimiter?', opts: ['space', 'tab', 'colon', 'comma'], a: 2 }, { q: 'sed -i edits the file ___', opts: ['in a temp location', 'in place on disk', 'in memory only', 'after a backup'], a: 1 }] },
      { num: '03', title: 'Process Management', tags: ['ps', 'top', 'kill', 'nice'], objectives: ['View and monitor processes', 'Kill and manage process states', 'Adjust priority and run background jobs'], content: `<div class="content-section"><div class="code-block"><div class="code-header"><span class="code-lang">bash — Processes</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre>ps aux                         <span class="comment"># All processes, all users</span>
ps aux | grep nginx            <span class="comment"># Find specific process</span>
ps -ef --forest                <span class="comment"># Process tree</span>
top                            <span class="comment"># Live monitor (q=quit, k=kill)</span>
htop                           <span class="comment"># Enhanced (sudo apt install htop)</span>

pgrep nginx                    <span class="comment"># Get PID by name</span>
pidof sshd                     <span class="comment"># Exact process name</span>

<span class="comment"># Signals</span>
kill PID                       <span class="comment"># SIGTERM — polite stop</span>
kill -9 PID                    <span class="comment"># SIGKILL — force stop</span>
kill -1 PID                    <span class="comment"># SIGHUP — reload config</span>
killall nginx                  <span class="comment"># Kill all by name</span>

<span class="comment"># Background/foreground</span>
sleep 60 &                     <span class="comment"># Start in background</span>
jobs                           <span class="comment"># List background jobs</span>
fg %1                          <span class="comment"># Bring to foreground</span>
bg %1                          <span class="comment"># Resume in background</span>
nohup ./script.sh &            <span class="comment"># Keep after logout</span>

<span class="comment"># Priority (-20=highest, +19=lowest)</span>
nice -n 10 ./script.sh
renice 5 -p PID
ps -eo pid,ni,cmd | head -20   <span class="comment"># Check nice values</span></pre></div></div>`, vocab: [['ps aux', 'Shows all running processes'], ['kill -9', 'Force-stop a process immediately (SIGKILL)'], ['jobs', 'Lists background jobs in current shell'], ['nice', 'Sets process priority at start'], ['renice', 'Changes priority of a running process']], activity: '1. Run ps aux, find top 3 by CPU. 2. Start sleep 300 & and kill it. 3. Use top and kill a process with k. 4. Run nice -n 15 sleep 60 & and check with ps -eo pid,ni.', quiz: [{ q: 'kill -9 sends which signal?', opts: ['SIGTERM', 'SIGHUP', 'SIGKILL', 'SIGSTOP'], a: 2 }, { q: 'What does & at end of command do?', opts: ['Runs as root', 'Redirects output', 'Sends to background', 'Chains commands'], a: 2 }, { q: 'Nice range is ___', opts: ['0 to 100', '-10 to 10', '-20 to 19', '1 to 20'], a: 2 }] },
      { num: '04', title: 'User & Group Administration', tags: ['Admin', 'chmod', 'sudo'], objectives: ['Create and manage users and groups', 'Configure sudo access safely', 'Apply ownership and permissions'], content: `<div class="content-section"><div class="code-block"><div class="code-header"><span class="code-lang">bash — Users</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><span class="comment"># Create users</span>

<span class="comment"># Modify users</span>

sudo usermod -G g1,g2 username  <span class="comment"># Replace groups (careful!)</span>
sudo usermod -L username        <span class="comment"># Lock account</span>
sudo usermod -U username        <span class="comment"># Unlock account</span>

<span class="comment"># Delete</span>
sudo usermod -L username        <span class="comment"># Lock first</span>
sudo userdel -r username        <span class="comment"># Delete + home directory</span>

<span class="comment"># Groups</span>
groups username                 <span class="comment"># User's groups</span>
id username                     <span class="comment"># UID, GID, all groups</span>
sudo groupadd developers
sudo gpasswd -a john developers <span class="comment"># Add to group</span>
sudo gpasswd -d john developers <span class="comment"># Remove from group</span>

<span class="comment"># sudo config — ALWAYS use visudo</span>

// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
let currentTier = 1;
let currentIdx = -1; // -1 = overview
let progress = JSON.parse(localStorage.getItem('nac_progress') || '{}');

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
function init() {
  // Apply correct active tab from URL hash
  document.querySelectorAll('.tier-tab').forEach((t, i) => {
    t.classList.toggle('active', i + 1 === currentTier);
  });
  renderSidebar();
  renderOverview();
  setHashForTier(currentTier);
}

function renderSidebar() {
  const tier = TIERS[currentTier];
  document.getElementById('tier-label').textContent = tier.label;
  document.getElementById('tier-title').textContent = tier.title;
  document.getElementById('tier-price').textContent = tier.price;

  const list = document.getElementById('session-list');
  const doneSet = progress[currentTier] || new Set();

  let html = `<div class="session-item ${currentIdx === -1 ? 'active' : ''}" onclick="navigate(-1)">
    <span class="session-num">⌂</span>
    <span class="session-name">Overview</span>
    <span class="session-dot ${doneSet.size === tier.sessions.length ? 'done' : ''}"></span>
  </div>`;

  tier.sessions.forEach((s, i) => {
    const done = (progress[currentTier] || []).includes(i);
    html += `<div class="session-item ${currentIdx === i ? 'active' : ''} ${done ? 'done' : ''}" onclick="navigate(${i})">
      <span class="session-num">${s.num}</span>
      <span class="session-name">${s.title}</span>
      <span class="session-dot ${done ? 'done' : ''}"></span>
    </div>`;
  });

  list.innerHTML = html;
  updateProgress();
}

function updateProgress() {
  const tier = TIERS[currentTier];
  const done = (progress[currentTier] || []).length;
  const total = tier.sessions.length;
  document.getElementById('progress-text').textContent = `${done} / ${total}`;
  document.getElementById('progress-fill').style.width = `${(done/total)*100}%`;
}

// ══════════════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════════════
function switchTier(n) {
  currentTier = n;
  currentIdx = -1;
  document.querySelectorAll('.tier-tab').forEach((t, i) => {
    t.classList.toggle('active', i + 1 === n);
  });
  renderSidebar();
  renderOverview();
  document.getElementById('main').scrollTop = 0;
}

function navigate(idx) {
  currentIdx = idx;
  renderSidebar();
  if (idx === -1) {
    renderOverview();
  } else {
    renderSession(idx);
  }
  document.getElementById('main').scrollTop = 0;
  closeSidebar();
}

function navigatePrev() {
  if (currentIdx > 0) navigate(currentIdx - 1);
  else if (currentIdx === 0) navigate(-1);
}

function navigateNext() {
  const max = TIERS[currentTier].sessions.length - 1;
  if (currentIdx === -1) navigate(0);
  else if (currentIdx < max) navigate(currentIdx + 1);
}

function updateNavButtons() {
  const max = TIERS[currentTier].sessions.length - 1;
  document.getElementById('btn-prev').disabled = currentIdx < 0;
  document.getElementById('btn-next').disabled = currentIdx === max;
}

// ══════════════════════════════════════════════════════
//  RENDER OVERVIEW
// ══════════════════════════════════════════════════════
function renderOverview() {
  const tier = TIERS[currentTier];
  const statsHTML = tier.stats.map(s => `
    <div class="overview-stat">
      <div class="overview-stat-num">${s.n}</div>
      <div class="overview-stat-label">${s.l}</div>
    </div>`).join('');

  document.getElementById('content-body').innerHTML = `
    <div class="tier-overview">
      <div class="tier-overview-badge">Tier ${currentTier} · NAC Digital Foundation™</div>
      <h1>${tier.title}</h1>
      <p>${tier.desc}</p>
      <div class="overview-stats">${statsHTML}</div>
      <button class="start-btn" onclick="navigate(0)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
        Start Course
      </button>
    </div>`;

  document.getElementById('bc-tier').textContent = `T${currentTier}`;
  document.getElementById('bc-session').textContent = 'Overview';
  updateNavButtons();
  updateMarkButton();
}

// ══════════════════════════════════════════════════════
//  RENDER SESSION
// ══════════════════════════════════════════════════════
function renderSession(idx) {
  const tier = TIERS[currentTier];
  const s = tier.sessions[idx];
  const isDone = (progress[currentTier] || []).includes(idx);

  const tagsHTML = (s.tags || []).map(t => `<div class="meta-pill">${t}</div>`).join('');

  const objHTML = s.objectives ? `
    <div class="objectives">
      <div class="objectives-label">Learning Objectives</div>
      <ul>${s.objectives.map(o => `<li>${o}</li>`).join('')}</ul>
    </div>` : '';

  const vocabHTML = s.vocab ? `
    <div class="content-section">
      <h2>Key Vocabulary</h2>
      <table class="vocab-table">
        <thead><tr><th>Term</th><th>Definition</th></tr></thead>
        <tbody>${s.vocab.map(v => `<tr><td>${v[0]}</td><td>${v[1]}</td></tr>`).join('')}</tbody>
      </table>
    </div>` : '';

  const activityHTML = s.activity ? `
    <div class="activity">
      <div class="activity-label">Practice Activity</div>
      <p>${s.activity}</p>
    </div>` : '';

  const quizHTML = s.quiz ? renderQuiz(s.quiz) : '';

  document.getElementById('content-body').innerHTML = `
    <div class="session-header">
      <div class="session-eyebrow">T${currentTier} · ${tier.label}</div>
      <div class="session-title-big">${s.num}. ${s.title}</div>
      <div class="session-meta">${tagsHTML}</div>
    </div>
    ${objHTML}
    <div class="divider-line"></div>
    ${s.content || ''}
    ${vocabHTML}
    ${activityHTML}
    ${quizHTML}`;

  document.getElementById('bc-tier').textContent = `T${currentTier}`;
  document.getElementById('bc-session').textContent = `${s.num} — ${s.title}`;
  updateNavButtons();
  updateMarkButton();
}

function renderQuiz(questions) {
  const qs = questions.map((q, qi) => `
    <div class="quiz-q">
      <p>Q${qi+1}. ${q.q}</p>
      <div class="quiz-options">
        ${q.opts.map((opt, oi) => `
          <div class="quiz-opt" onclick="checkAnswer(this, ${qi}, ${oi}, ${q.a})" data-qi="${qi}" data-oi="${oi}">
            <span class="opt-letter">${String.fromCharCode(65+oi)}.</span>
            ${opt}
          </div>`).join('')}
      </div>
    </div>`).join('');

  return `<div class="quiz-section">
    <div class="quiz-header">
      <div class="quiz-icon">❓</div>
      <div class="quiz-title">Session Quiz</div>
    </div>
    <div class="quiz-body">${qs}</div>
  </div>`;
}

function checkAnswer(el, qi, oi, correct) {
  const opts = el.parentElement.querySelectorAll('.quiz-opt');
  opts.forEach(o => {
    const idx = parseInt(o.dataset.oi);
    if (idx === correct) o.classList.add('correct');
    else if (o === el && oi !== correct) o.classList.add('wrong');
    o.style.pointerEvents = 'none';
  });
}

// ══════════════════════════════════════════════════════
//  PROGRESS
// ══════════════════════════════════════════════════════
function toggleDone() {
  if (currentIdx < 0) return;
  if (!progress[currentTier]) progress[currentTier] = [];
  const arr = progress[currentTier];
  const i = arr.indexOf(currentIdx);
  if (i > -1) arr.splice(i, 1);
  else arr.push(currentIdx);
  localStorage.setItem('nac_progress', JSON.stringify(progress));
  renderSidebar();
  updateMarkButton();
}

function updateMarkButton() {
  const btn = document.getElementById('btn-mark');
  if (currentIdx < 0) {
    btn.style.display = 'none';
    return;
  }
  btn.style.display = '';
  const done = (progress[currentTier] || []).includes(currentIdx);
  btn.textContent = done ? '✓ Completed' : 'Mark Complete';
  btn.classList.toggle('done', done);
}

// ══════════════════════════════════════════════════════
//  CODE COPY
// ══════════════════════════════════════════════════════
function copyCode(btn) {
  const pre = btn.closest('.code-block').querySelector('pre');
  const text = pre.innerText;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

// ══════════════════════════════════════════════════════
//  MOBILE SIDEBAR
// ══════════════════════════════════════════════════════
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// ══════════════════════════════════════════════════════
//  HASH-BASED DEEP LINKING
// ══════════════════════════════════════════════════════
function getTierFromHash() {
  const hash = window.location.hash.toLowerCase();
  const map = { '#t1': 1, '#t2': 2, '#t3': 3, '#t4': 4 };
  return map[hash] || 1;
}

function setHashForTier(n) {
  history.replaceState(null, '', `#t${n}`);
}

// Override switchTier to also update the hash
const _switchTier = switchTier;
switchTier = function(n) {
  setHashForTier(n);
  currentTier = n;
  currentIdx = -1;
  document.querySelectorAll('.tier-tab').forEach((t, i) => {
    t.classList.toggle('active', i + 1 === n);
  });
  renderSidebar();
  renderOverview();
  document.getElementById('main').scrollTop = 0;
};

// Listen for back/forward navigation
window.addEventListener('hashchange', () => {
  const n = getTierFromHash();
  if (n !== currentTier) switchTier(n);
});

// ══════════════════════════════════════════════════════
//  START
// ══════════════════════════════════════════════════════
currentTier = getTierFromHash();
init();
</script>
</body>
</html>
